# News selection / prioritization for the DeepSeek classification budget.
#
# Problem: the classifier has a per-run cap. Selecting the NEWEST N items is
# arbitrary - trivial late-posted blurbs can evict the day's important macro
# news. This config drives a PURE (no LLM, no network) ranker that spends the
# budget on the most important, broadest set instead.
#
# priority = source_authority * capped_salience * freshness * novelty
#   capped_salience = 1 + min(macro_keyword_hits, max_keyword_hits)
#   novelty penalizes lexical near-duplicates of a higher-priority article
# then per-group quotas guarantee breadth, and a min_priority threshold means
# quiet days classify fewer items (cost scales with real signal).
#
# ALL numbers below are HAND-SET PRIORS (editorial judgement), not measured.

news_selection:
  # Hard ceiling per run. ~120/day x 30 ~= $1.2/month at flash rates (< $5 cap).
  daily_cap: 120

  # Drop items whose priority is below this. Keeps quiet days cheap.
  min_priority: 0.15

  # Freshness exponential decay (selection-tuned: shorter half-life than scoring).
  half_life_days: 4.0
  max_age_days: 14

  # Per-source authority multiplier. Official sources outrank vendor blogs.
  # Unlisted sources default to 1.0.
  source_authority:
    federal_reserve_press: 1.6
    federal_reserve_speeches: 1.5
    bls_latest: 1.5
    dol_releases: 1.4
    eia_energy: 1.3
    cnbc_economy: 1.2
    cnbc_markets: 1.2
    cnbc_finance: 1.2
    nasdaq_markets: 1.1
    marketwatch: 1.0
    scmp: 0.9
    cnbc_tech: 1.0
    cnbc_health: 1.0
    housingwire: 1.0
    oilprice: 0.9
    nvidia_blog: 0.7
    nvidia_developer_blog: 0.7
    google_cloud_blog: 0.7

  # Relative share of the daily_cap given to each source_group. Items with no
  # mapped group use `unmapped`. Weights are normalized over groups actually
  # present in the candidate pool; leftover budget is filled by global priority.
  group_quota_weights:
    macro_general: 1.3
    credit_financial_conditions: 1.2
    inflation_rates: 1.2
    labor: 1.1
    energy_commodities: 1.0
    real_estate: 0.9
    manufacturing_industrials: 0.8
    consumer: 0.8
    geopolitical: 0.8
    technology_ai: 0.7
    healthcare: 0.7
    ai_compute: 0.6
    unmapped: 0.3

  # Quality gate (pure): drop likely non-news and too-short bodies before ranking.
  min_body_words: 25
  drop_likely_non_news: true

  # Cap keyword salience so one keyword-stuffed macro article can't dominate.
  max_keyword_hits: 6

  # Lexical event-dedupe: within the candidate pool, the highest-priority
  # article of a near-duplicate cluster keeps full weight; later duplicates are
  # multiplied by novelty_penalty. Stops one crowded narrative filling the cap.
  dedupe_near_duplicates: true
  novelty_similarity_threshold: 0.6  # token-Jaccard >= this => same event
  novelty_penalty: 0.4               # 0 = drop duplicate, 1 = no penalty
