secular_themes:
  ai_compute:
    label: AI Compute Infrastructure
    description: "Companies providing hardware, cloud, and data-center infrastructure for AI training and inference workloads."
  physical_ai:
    label: Physical AI / Robotics
    description: "Companies at the intersection of AI and the physical world — robotics, autonomous systems, edge AI, and industrial automation."
  glp1_metabolic:
    label: GLP-1 / Metabolic Health
    description: "Companies involved in GLP-1 receptor agonists, metabolic therapeutics, and the broader obesity/diabetes treatment ecosystem."
  cloud_software:
    label: Cloud Software & SaaS
    description: "Companies with recurring-revenue cloud software models, including vertical SaaS, PaaS, and infrastructure-as-a-service."
  energy_transition:
    label: Energy Transition & Clean Tech
    description: "Companies enabling the shift to low-carbon energy — renewables, grid modernization, battery storage, and electrification."
  cybersecurity:
    label: Cybersecurity
    description: "Companies providing security software, hardware, and services for threat detection, identity, endpoint, cloud, and network defense."
  quantum_computing:
    label: Quantum Computing
    description: "Companies developing quantum computing hardware (trapped-ion, superconducting, photonic, neutral-atom), quantum software/algorithms, or post-quantum cryptography. Largely pre-revenue."
  space_economy:
    label: Space Economy
    description: "Launch services, satellites, satellite communications, space-based imagery/intelligence, space defense, and supporting infrastructure (ground stations, hypersonic). Excludes traditional aerospace/airline business."
  nuclear_renaissance:
    label: Nuclear Renaissance
    description: "Companies enabling the resurgence of nuclear power — large reactors, small modular reactors (SMRs), advanced reactors, uranium mining + enrichment, nuclear fuel cycle, and nuclear utilities. Driven by AI-data-center power demand and decarbonization mandates."

