price_provider:
  # Free daily ETF prices from stooq (no API key). CI fetches live each run.
  provider: stooq
  csv_path: data/sector_proxy_prices.csv
  start_date: "1998-12-22"
  end_date: null

benchmark_ticker: SPY
horizons_months:
  - 1
  - 3

proxies:
  communication_services: XLC
  consumer_discretionary: XLY
  consumer_staples: XLP
  energy: XLE
  financials: XLF
  health_care: XLV
  industrials: XLI
  information_technology: XLK
  materials: XLB
  real_estate: XLRE
  utilities: XLU
  # Sub-industries (WS-A). ETF proxies for forward-return validation.
  semiconductors: SMH
  software: IGV
  banks: KBE
  biotech: XBI
  homebuilders: XHB
  oil_gas_ep: XOP

reports:
  output_dir: outputs
