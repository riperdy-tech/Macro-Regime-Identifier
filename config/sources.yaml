  - feature_id: us_leading_index_disabled
    series_id: USSLIND
    name: Leading Index for the United States
    provider: FRED
    dimension: growth_momentum
    frequency: monthly
    transform: level
    normalization: rolling_z_5y
    direction: direct
    weight: 0.00
    source_tier: 0
    required: false
    enabled: false
    reason_disabled: discontinued_or_stale
    stale_after_days: 45
    unusable_after_days: 120
    max_staleness_days: 45
    allow_discontinued: false
    min_history_years: 5
    missing_policy: neutralize
