sources:
  - feature_id: headline_cpi_yoy_z
    series_id: CPIAUCSL
    name: Consumer Price Index for All Urban Consumers
    provider: FRED
    dimension: inflation_pressure
    frequency: monthly
    transform: yoy_pct_change
    normalization: rolling_z_5y
    direction: direct
    weight: 0.45
    source_tier: 0
    required: true
    enabled: true
    stale_after_days: 45
    unusable_after_days: 120
    max_staleness_days: 45
    allow_discontinued: false
    min_history_years: 5
    missing_policy: drop_feature
    notes: Headline CPI inflation.

  - feature_id: core_pce_yoy_z
    series_id: PCEPILFE
    name: Core Personal Consumption Expenditures Price Index
    provider: FRED
    dimension: inflation_pressure
    frequency: monthly
    transform: yoy_pct_change
    normalization: rolling_z_5y
    direction: direct
    weight: 0.55
    source_tier: 0
    required: true
    enabled: true
    stale_after_days: 45
    unusable_after_days: 120
    max_staleness_days: 45
    allow_discontinued: false
    min_history_years: 5
    missing_policy: drop_feature
    notes: Core PCE inflation.

  - feature_id: industrial_production_yoy_z
    series_id: INDPRO
    name: Industrial Production Total Index
    provider: FRED
    dimension: growth_momentum
    frequency: monthly
    transform: yoy_pct_change
    normalization: rolling_z_5y
    direction: direct
    weight: 1.00
    source_tier: 0
    required: true
    enabled: true
    stale_after_days: 45
    unusable_after_days: 120
    max_staleness_days: 45
    allow_discontinued: false
    min_history_years: 5
    missing_policy: drop_feature
    notes: Phase A growth proxy.

  - feature_id: unemployment_3m_change_z
    series_id: UNRATE
    name: Unemployment Rate
    provider: FRED
    dimension: labor_tightness
    frequency: monthly
    transform: diff_3m
    normalization: rolling_z_5y
    direction: inverse
    weight: 1.00
    source_tier: 0
    required: true
    enabled: true
    stale_after_days: 45
    unusable_after_days: 120
    max_staleness_days: 45
    allow_discontinued: false
    min_history_years: 5
    missing_policy: drop_feature
    notes: Rising unemployment weakens labor tightness.

  - feature_id: fed_funds_level_z
    series_id: FEDFUNDS
    name: Effective Federal Funds Rate
    provider: FRED
    dimension: policy_stance
    frequency: monthly
    transform: level
    normalization: rolling_z_10y
    direction: inverse
    weight: 0.50
    source_tier: 0
    required: true
    enabled: true
    stale_after_days: 45
    unusable_after_days: 120
    max_staleness_days: 45
    allow_discontinued: false
    min_history_years: 5
    missing_policy: drop_feature
    notes: High policy-rate level is restrictive.

  - feature_id: two_year_yield_6m_change_z
    series_id: DGS2
    name: 2-Year Treasury Constant Maturity Rate
    provider: FRED
    dimension: policy_stance
    frequency: daily
    transform: diff_6m
    normalization: rolling_z_5y
    direction: inverse
    weight: 0.50
    source_tier: 1
    required: true
    enabled: true
    stale_after_days: 5
    unusable_after_days: 15
    max_staleness_days: 5
    allow_discontinued: false
    min_history_years: 5
    missing_policy: drop_feature
    notes: Rising front-end yields indicate policy tightening.

  - feature_id: nfci_level_z
    series_id: NFCI
    name: Chicago Fed National Financial Conditions Index
    provider: FRED
    dimension: financial_conditions
    frequency: weekly
    transform: level
    normalization: rolling_z_5y
    direction: inverse
    weight: 1.00
    source_tier: 1
    required: true
    enabled: true
    stale_after_days: 14
    unusable_after_days: 35
    max_staleness_days: 14
    allow_discontinued: false
    min_history_years: 5
    missing_policy: drop_feature
    notes: Higher NFCI indicates tighter financial conditions.

  - feature_id: sp500_3m_return_z
    series_id: SP500
    name: S&P 500
    provider: FRED
    dimension: market_risk_appetite
    frequency: daily
    transform: pct_change_3m
    normalization: rolling_z_5y
    direction: direct
    weight: 0.50
    source_tier: 1
    required: true
    enabled: true
    stale_after_days: 5
    unusable_after_days: 15
    max_staleness_days: 5
    allow_discontinued: false
    min_history_years: 5
    missing_policy: drop_feature
    notes: Equity market trend.

  - feature_id: vix_level_z
