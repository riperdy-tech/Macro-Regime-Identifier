    provider: rss
    enabled: false
    profiles:
      - live_rss
    feed_url: https://www.cnbc.com/id/19836768/device/rss/rss.html
    source: cnbc_energy
    source_group: energy_commodities
    max_items: 12
    lookback_days: 3

  - source_id: cnbc_business_rss
