news_sources:
  - source_id: synthetic_sample_news
    provider: local_csv
    enabled: true
    profiles:
      - synthetic_sample
    path: data/examples/sample_news_items.csv

  - source_id: pilot_local_csv
    provider: local_csv
    enabled: false
    profiles:
      - pilot_local_csv
      - real_news_pilot
    path: data/news_pilot/news_items.csv

  - source_id: pilot_expanded_local_csv
    provider: local_csv
    enabled: false
    profiles:
      - pilot_expanded_local_csv
      - expanded_real_news_pilot
    path: data/news_pilot/news_items_expanded.csv

  - source_id: pilot_balanced_local_csv
    provider: local_csv
    enabled: false
    profiles:
      - pilot_balanced_local_csv
      - balanced_real_news_pilot
    path: data/news_pilot/news_items_balanced.csv

  - source_id: last_30_days_local_csv
    provider: local_csv
    enabled: false
    profiles:
      - last_30_days_local_csv
      - last_30_days_real_news
      - mapped_30_day_replay
    path: data/news_pilot/news_items_last_30_days.csv

  - source_id: pilot_balanced_local_json
    provider: local_json
    enabled: false
    profiles:
      - pilot_balanced_local_json
      - balanced_real_news_pilot_json
    path: data/news_pilot/news_items_balanced.json

  - source_id: daily_local_csv
    provider: local_csv
    enabled: false
    profiles:
      - daily_local_csv
      - daily_real_news
    path: data/news_pilot/daily_news_items.csv

  - source_id: daily_local_json
    provider: local_json
    enabled: false
    profiles:
      - daily_local_json
      - daily_real_news_json
    path: data/news_pilot/daily_news_items.json

  - source_id: rss_watchlist_example
    provider: rss
    enabled: false
    profiles:
      - rss_watchlist
    feed_url: https://example.invalid/rss.xml
    source: example_rss
    source_group: macro_general
    max_items: 25
    lookback_days: 2

  - source_id: ai_compute_nvidia_blog_rss
    provider: rss
    enabled: false
    profiles:
      - ai_compute_rss
      - rss_watchlist
    feed_url: https://feeds.feedburner.com/nvidiablog
    source: nvidia_blog
    source_group: ai_compute
    max_items: 15
    lookback_days: 7

  - source_id: ai_compute_nvidia_developer_rss
    provider: rss
    enabled: false
    profiles:
      - ai_compute_rss
      - rss_watchlist
    feed_url: https://developer.nvidia.com/blog/feed
    source: nvidia_developer_blog
    source_group: ai_compute
    max_items: 15
    lookback_days: 7

  - source_id: ai_compute_google_cloud_blog_rss
    provider: rss
    enabled: false
    profiles:
      - ai_compute_rss
      - rss_watchlist
    feed_url: https://cloud.google.com/blog/products/rss
    source: google_cloud_blog
    source_group: ai_compute
    max_items: 15
    lookback_days: 7

  - source_id: manual_text_example
    provider: manual_text
    enabled: false
    profiles:
      - manual_example
    items:
      - title: Synthetic manual policy event
        body: A central bank official said policy may stay restrictive until inflation cools.
        source: synthetic_manual
        source_url:
        published_at: "2026-05-01T12:00:00Z"

source_group_rules:
  - rule_id: expanded_inflation_rates_terms
    source_group: inflation_rates
    source_ids:
      - pilot_expanded_local_csv
      - pilot_balanced_local_csv
      - daily_local_csv
    title_keywords:
      - inflation
      - interest rate
      - interest rates
      - Fed
      - Powell
      - Warsh
      - bond yield
      - monetary policy
      - central bank

  - rule_id: expanded_labor_terms
    source_group: labor
    source_ids:
      - pilot_expanded_local_csv
      - pilot_balanced_local_csv
      - daily_local_csv
    title_keywords:
      - jobless
      - jobs report
      - payroll
      - labor market
      - job market
      - hiring
      - layoffs
      - JOLTS

  - rule_id: expanded_energy_commodity_terms
    source_group: energy_commodities
    source_ids:
      - pilot_expanded_local_csv
      - pilot_balanced_local_csv
      - daily_local_csv
    title_keywords:
      - oil
      - energy
      - gas prices
      - Strait of Hormuz
      - commodity
      - commodities
      - supply disruption
      - fuel price

  - rule_id: expanded_credit_financial_conditions_terms
    source_group: credit_financial_conditions
    source_ids:
      - pilot_expanded_local_csv
      - pilot_balanced_local_csv
      - daily_local_csv
    title_keywords:
      - credit
      - financial conditions
      - financial stability
      - lending
      - banks
      - bank
      - liquidity
      - debt

  - rule_id: expanded_real_estate_terms
    source_group: real_estate
    source_ids:
      - pilot_expanded_local_csv
      - pilot_balanced_local_csv
      - daily_local_csv
    title_keywords:
      - mortgage
      - housing
      - real estate
      - home prices
      - home prices drop
      - housing market

  - rule_id: expanded_geopolitical_terms
    source_group: geopolitical
    source_ids:
      - pilot_expanded_local_csv
      - pilot_balanced_local_csv
      - daily_local_csv
    title_keywords:
      - war
      - Iran
      - Middle East
      - geopolitical

  - rule_id: expanded_macro_general_terms
    source_group: macro_general
    source_ids:
      - pilot_expanded_local_csv
      - pilot_balanced_local_csv
      - daily_local_csv
    title_keywords:
      - economy
      - economic
      - GDP
      - outlook
      - markets
      - market
