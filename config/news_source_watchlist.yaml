coverage:
  output_dir: outputs
  required_source_groups:
    - macro_general
    - inflation_rates
    - labor
    - energy_commodities
    - credit_financial_conditions
    - real_estate
    - consumer
    - manufacturing_industrials
    - geopolitical
    - technology_ai
    - healthcare
    - defensive_sectors
    - ai_compute
  max_group_share: 0.35
  max_unmapped_pct: 0.20
  min_source_groups: 3
  max_single_group_pct: 0.50
  max_old_item_pct: 0.20
  stale_after_days: 3

news_source_watchlist:
  - source_id: synthetic_sample_news
    source_name: synthetic_example
    source_group: macro_general
    provider_type: local_csv
    path: data/examples/sample_news_items.csv
    enabled: true
    max_items_per_run: 10
    lookback_days: 30
    region: US
    notes: Synthetic sample used for tests and mock-safe daily runs.

  - source_id: daily_macro_general_csv
    source_name: daily_macro_general
    source_group: macro_general
    provider_type: local_csv
    path: data/news_pilot/news_items_last_30_days.csv
    enabled: true
    max_items_per_run: 25
    lookback_days: 2
    region: US
    notes: Local mapped 30-day macro-general coverage file used until a refreshed daily file is supplied.

  - source_id: daily_inflation_rates_csv
