  # and regime priors are HAND-SET from sub-industry macro economics (duration,
  # cyclicality, rate/credit sensitivity), NOT empirically measured. Treat as
  # priors. Each must have a row in sector_exposures.yaml and a prior for every
  # regime in sector_regime_priors.yaml (config validation enforces this).
