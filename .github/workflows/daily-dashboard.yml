name: Daily Diagnostic + Dashboard Publish

# Runs the full daily diagnostic pipeline, exports dashboard data,
# builds the dashboard, and publishes to GitHub Pages.
#
# GitHub cron is UTC. "37 22 * * *" = daily ~22:37 UTC.
# Adjust for your timezone.

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode"
        required: true
        type: choice
        default: "mock"
        options:
          - mock
          - live
      max_live_items:
        description: "Max live AI classification items (live mode only)"
        required: false
        type: string
        default: "25"
      source_profile:
        description: "News source profile (blank uses run-mode default)"
        required: false
        type: string
        default: ""

  schedule:
    # Daily at 22:37 UTC (adjust cron for your timezone)
    - cron: "37 22 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: "daily-dashboard"
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore run history (run-history branch)
        # Run-audit snapshots and the calibration ledger live on the dedicated
        # run-history branch (not master) so daily bot commits do not pollute
        # code history. Restore them into the working tree: history_index
        # derives from outputs/archive/, and the calibration ledger merges
        # with the restored copy each run.
        run: |
          git fetch origin run-history || true
          if git show-ref --quiet refs/remotes/origin/run-history; then
            git checkout origin/run-history -- outputs
            git reset -q -- outputs
            echo "Restored run history from run-history branch."
          else
            echo "No run-history branch yet; starting fresh."
          fi

      - name: Restore accumulated database
        # Persist the DuckDB across runs so news accumulates (readiness advances,
        # classify-only-unclassified avoids re-paying DeepSeek). Rolling key:
        # restores the most recent cache, saves a fresh one at job end.
        uses: actions/cache@v4
        with:
          path: data/macro_engine.duckdb
          key: mgi-duckdb-${{ github.run_id }}
          restore-keys: |
            mgi-duckdb-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Validate config
        run: python -m macro_engine.cli validate-config

      - name: Lint check
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest --tb=short

      - name: Set run mode
        id: mode
        run: |
          # Scheduled runs (no inputs) default to LIVE so the dashboard uses real
          # news. Manual dispatch keeps its own default (mock) for cheap testing.
          MODE="${{ inputs.run_mode || 'live' }}"
          echo "run_mode=$MODE" >> $GITHUB_OUTPUT
          if [ "$MODE" = "live" ]; then
            echo "mock_ai_flag=" >> $GITHUB_OUTPUT
            echo "live_ai_flag=--live-ai" >> $GITHUB_OUTPUT
            echo "pipeline_config=config/daily_pipeline_github_live.yaml" >> $GITHUB_OUTPUT
            echo "default_source_profile=live_rss" >> $GITHUB_OUTPUT
          else
            echo "mock_ai_flag=--mock-ai" >> $GITHUB_OUTPUT
            echo "live_ai_flag=" >> $GITHUB_OUTPUT
            echo "pipeline_config=config/daily_pipeline_github.yaml" >> $GITHUB_OUTPUT
            echo "default_source_profile=synthetic_sample" >> $GITHUB_OUTPUT
          fi

      - name: Run daily diagnostic
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Optional: Finnhub market-news source group. The finnhub source is
          # skipped gracefully when this secret is not configured.
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          SOURCE_PROFILE="${{ inputs.source_profile || steps.mode.outputs.default_source_profile }}"
          python -m macro_engine.cli run-daily-diagnostic \
            --config "${{ steps.mode.outputs.pipeline_config }}" \
            --source-profile "$SOURCE_PROFILE" \
            ${{ steps.mode.outputs.mock_ai_flag }} \
            ${{ steps.mode.outputs.live_ai_flag }} \
            --max-live-items "${{ inputs.max_live_items || '120' }}" \
            --archive

      - name: Run news accumulation
        run: python -m macro_engine.cli run-news-accumulation --config config/news_accumulation.yaml

      - name: Write accumulation report
        run: python -m macro_engine.cli write-news-accumulation-report --config config/news_accumulation.yaml

      - name: Write source coverage report
        run: python -m macro_engine.cli write-news-source-coverage-report --config config/news_source_watchlist.yaml

      - name: Build secular theme tracker
        run: python -m macro_engine.cli build-secular-theme-scores --config config/news_scoring.yaml

      - name: Write regime status
        run: python -m macro_engine.cli write-regime-status

      - name: Run NBER benchmark
        # Diagnostic comparison of the stored regime timeline against NBER
        # recession dates. Enrichment only — never blocks the dashboard.
        run: python -m macro_engine.cli run-nber-benchmark
        continue-on-error: true

      - name: Prune old raw AI responses (bound the DB)
        run: python -m macro_engine.cli prune-news-history --max-age-days 150
        continue-on-error: true

      - name: Ingest sector proxy prices (free stooq)
        # Forward returns need future prices landing over time; without this the
        # calibration ledger's calls never resolve.
        run: python -m macro_engine.cli ingest-sector-proxy-prices
        continue-on-error: true

      - name: Run sector validation (free stooq prices)
        run: python -m macro_engine.cli run-sector-validation
        continue-on-error: true

      - name: Write sector validation report
        run: python -m macro_engine.cli write-sector-validation-report
        continue-on-error: true

      - name: Refresh confidence calibration ledger (live, forward-only)
        # Builds/accumulates the LIVE ledger (date_basis=classified_at) and the
        # readiness artifact. Provisional backfill is a separate file and never
        # feeds this. The valve stays identity until the artifact reports
        # ready=true on this live data and a transform is fitted.
        run: python -m macro_engine.cli run-news-confidence-calibration
        continue-on-error: true

      - name: Export dashboard data
        run: python -m macro_engine.cli export-dashboard-data

      - name: Write automation summary
        run: python -m macro_engine.cli write-automation-summary

      - name: Export dashboard data with automation summary
        run: python -m macro_engine.cli export-dashboard-data

      - name: Persist run-audit snapshot (run-history branch)
        # Commit this run's daily summary + calibration ledger to the dedicated
        # run-history branch so history_index accumulates across runs without
        # polluting master's commit history. The ledger + artifact survive even
        # if the DuckDB cache is LRU-evicted; the ledger merges with the
        # restored copy on each run.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin run-history || true
          if git show-ref --quiet refs/remotes/origin/run-history; then
            git worktree add .run-history origin/run-history
          else
            git worktree add --detach .run-history
            git -C .run-history checkout --orphan run-history
            git -C .run-history rm -rfq . || true
          fi
          mkdir -p .run-history/outputs/archive
          (cd outputs/archive 2>/dev/null && find . -name daily_diagnostic_summary.json -exec install -D {} ../../.run-history/outputs/archive/{} \;) || true
          cp outputs/confidence_calibration_ledger.parquet .run-history/outputs/ 2>/dev/null || true
          cp outputs/confidence_calibration_artifact.json .run-history/outputs/ 2>/dev/null || true
          cp outputs/confidence_calibration.json outputs/confidence_calibration.md .run-history/outputs/ 2>/dev/null || true
          cd .run-history
          git add -A outputs
          if git diff --cached --quiet; then
            echo "No new run-audit snapshot to commit."
          else
            git commit -m "chore(history): persist daily run-audit snapshot + calibration ledger"
            git push origin HEAD:run-history
          fi

      - name: Alert on regime change or guardrail failure
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          MSG=$(python scripts/check_alert.py) || true
          if [ -n "$MSG" ]; then
            echo "ALERT: $MSG"
            BODY=$(python -c "import json,sys;print(json.dumps({'title':'MGI alert: '+sys.argv[1],'body':sys.argv[1]+chr(10)+chr(10)+'Automated alert from the daily diagnostic run.','labels':['mgi-alert']}))" "$MSG")
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/issues" -d "$BODY" >/dev/null
          else
            echo "No alert."
          fi

      - name: Build dashboard
        working-directory: dashboard
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-outputs
          path: |
            outputs/daily_diagnostic_summary.json
            outputs/daily_diagnostic_summary.md
            outputs/news_accumulation_report.json
            outputs/news_accumulation_report.md
            outputs/news_source_coverage_report.json
            outputs/news_source_coverage_report.md
            outputs/secular_theme_scores.json
            outputs/secular_theme_tracker_*.md
            outputs/regime_status.json
            outputs/nber_benchmark.json
            outputs/nber_benchmark.md
            outputs/automation_run_summary.json
            outputs/automation_run_summary.md
            outputs/confidence_calibration.json
            outputs/confidence_calibration.md
            outputs/confidence_calibration_artifact.json
            dashboard/public/data/manifest.json
            dashboard/public/data/history_index.json
          retention-days: 7

      - name: Disable Jekyll processing
        run: touch dashboard/dist/.nojekyll

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: dashboard/dist
