name: Deploy dashboard to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/pages.yml"
      - "dashboard/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Guard against sample-only publish
        id: publish_guard
        shell: bash
        run: |
          if [ -f dashboard/dist/data/manifest.json ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Exported dashboard data found; publishing Pages build."
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::warning::dashboard/dist/data/manifest.json is missing; skipping Pages publish to avoid replacing live data with sample fixtures."
          fi

      - name: Disable Jekyll processing
        if: steps.publish_guard.outputs.publish == 'true'
        run: touch dashboard/dist/.nojekyll

      - name: Publish dashboard to gh-pages
        if: steps.publish_guard.outputs.publish == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: dashboard/dist
